<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      background: #f0f0f0;
    }

    .calculator {
      width: 220px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    #display {
      width: 100%;
      height: 40px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 18px;
      padding-right: 10px;
    }

    button {
      width: 45px;
      height: 45px;
      margin: 3px;
      font-size: 16px;
      cursor: pointer;
      button:nth-child(1)  { background-color: #FF6B6B; color: red; } /* Nyekundu */
button:nth-child(2)  { background-color: #FF9F43; color: orange; } /* Chungwa */
button:nth-child(3)  { background-color: #FECA57; color: yellow; } /* Njano */
button:nth-child(4)  { background-color: #48DBFB; color: blue; } /* Bluu */
button:nth-child(5)  { background-color: #FF6B6B; color: black; }
button:nth-child(6)  { background-color: #1DD1A1; color: green; } /* Kijani */
button:nth-child(7)  { background-color: #A29BFE; color: purple; } /* Zambarau */
button:nth-child(8)  { background-color: #FD79A8; color: pink; } /* Pink */
button:nth-child(9)  { background-color: #FDCB6E; color: gold; } /* Dhahabu */
button:nth-child(10) { background-color: #6C5CE7; color: white; } /* Indigo */
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <br>
<button onclick="clearDisplay()">C</button>
  <button onclick="press('%')">%</button>
  <button onclick="clealastcharacter()">DEL</button>
  <button onclick="press('/')">/</button>
  <button onclick="press('9')">9</button>
  <button onclick="press('8')">8</button>
  <button onclick="press('7')">7</button>
  <button onclick="press('*')">*</button>

  <br>

  <button onclick="press('6')">6</button>
  <button onclick="press('5')">5</button>
  <button onclick="press('5')">4</button>
  <button onclick="press('-')">-</button>

  <br>

  <button onclick="press('3')">3</button>
  <button onclick="press('2')">2</button>
  <button onclick="press('1')">1</button>
  <button onclick="press('+')">+</button>

  <br>
  <button onclick="press('+/-')">+/-</button>
  <button onclick="press('0')">0</button>
  <button onclick="press('.')">.</button>
  <button onclick="calculate()">=</button>
</div>

<script>
  let display = document.getElementById("display");

  function press(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Error";
    }
  }
</script>

</body>
</html>
