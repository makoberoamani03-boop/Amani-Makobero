<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <style>
    :root {
      --bg: #f0f0f0;
      --panel: #ffffff;
      --shadow: rgba(0,0,0,0.12);
      --accent: #6C5CE7;
      --operator-bg: #f4f4f4;
      --btn-size: 56px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
    }

    .calculator {
      width: 260px;
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 6px 18px var(--shadow);
    }

    #display {
      width: 100%;
      height: 56px;
      margin-bottom: 12px;
      text-align: right;
      font-size: 20px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e6e6e6;
      background: #fafafa;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      height: var(--btn-size);
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #f7f7f7;
      transition: transform .06s ease, box-shadow .06s ease;
    }
    button:active { transform: translateY(1px); }

    button[type="button"].operator {
      background: var(--operator-bg);
      color: #222;
    }
    button[type="button"].action {
      background: #FF6B6B;
      color: #fff;
    }
    button[type="button"].equals {
      background: var(--accent);
      color: #fff;
    }

    /* Soft Pastel palette */
    .color-1 { background:#FFD1DC; color:#222; } /* pastel pink */
    .color-2 { background:#FFE3B3; color:#222; } /* pastel orange */
    .color-3 { background:#FFF2B2; color:#222; } /* pastel yellow */
    .color-4 { background:#BFF0FF; color:#022; } /* pastel cyan */
    .color-5 { background:#C8F7E0; color:#022; } /* pastel mint */
    .color-6 { background:#E9E0FF; color:#222; } /* pastel lavender */
    .color-7 { background:#FFD6E8; color:#222; } /* pastel rose */
    .color-8 { background:#FFF1D6; color:#222; } /* pastel peach */
    .color-9 { background:#D8DAFF; color:#222; } /* pastel indigo */

    /* Make the "=" button span one column taller if you want */
    .span-two { grid-column: span 2; }
    @media (max-width: 360px) {
      .calculator { width: 92%; }
    }
  </style>
</head>
<body>

  <div class="calculator" role="application" aria-label="Simple calculator">
    <input id="display" type="text" readonly aria-label="Calculator display" value="" />

    <div class="keys" role="group" aria-label="Calculator keys">
      <button type="button" class="action" data-action="clear" aria-label="Clear">C</button>
      <button type="button" class="operator" data-value="%" aria-label="Percent">%</button>
      <button type="button" class="operator" data-action="delete" aria-label="Delete">DEL</button>
      <button type="button" class="operator" data-value="/" aria-label="Divide">÷</button>

      <button type="button" data-value="9" class="color-1" aria-label="Nine">9</button>
      <button type="button" data-value="8" class="color-2" aria-label="Eight">8</button>
      <button type="button" data-value="7" class="color-3" aria-label="Seven">7</button>
      <button type="button" class="operator" data-value="*" aria-label="Multiply">×</button>

      <button type="button" data-value="6" aria-label="Six">6</button>
      <button type="button" data-value="5" aria-label="Five">5</button>
      <button type="button" data-value="4" aria-label="Four">4</button>
      <button type="button" class="operator" data-value="-" aria-label="Minus">−</button>

      <button type="button" data-value="3" aria-label="Three">3</button>
      <button type="button" data-value="2" aria-label="Two">2</button>
      <button type="button" data-value="1" aria-label="One">1</button>
      <button type="button" class="operator" data-value="+" aria-label="Plus">+</button>

      <button type="button" data-action="toggle-sign" aria-label="Toggle sign">+/-</button>
      <button type="button" data-value="0" aria-label="Zero">0</button>
      <button type="button" data-value="." aria-label="Decimal">.</button>
      <button type="button" class="equals" data-action="calculate" aria-label="Equals">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const keys = document.querySelector('.keys');

    // Append a value to display (numbers, operators)
    function append(value) {
      // Avoid adding multiple operators in a row
      const last = display.value.slice(-1);
      if (/[+\-*\/.%]/.test(last) && /[+\-*\/.%]/.test(value)) return;
      display.value += value;
    }

    // Clear all
    function clearDisplay() { display.value = ''; }

    // Delete last character
    function deleteLast() { display.value = display.value.slice(0, -1); }

    // Toggle sign of the last number (simple approach)
    function toggleSign() {
      // Find last number in expression
      display.value = display.value.replace(/(-?\d+(\.\d+)?)$/ , (m) => {
        return (parseFloat(m) * -1).toString();
      });
    }

    // Safe-ish calculate
    function calculate() {
      if (!display.value) return;
      let expr = display.value
        .replace(/×/g, '*')
        .replace(/÷/g, '/')
        // Convert percentage occurrences like "50%" => "(50/100)"
        .replace(/(\d+(\.\d+)?)%/g, '($1/100)');

      // Allow only digits, parentheses, whitespace and operators .+-*/%
      if (!/^[0-9+\-*/().\s%]+$/.test(expr)) {
        display.value = 'Error';
        return;
      }

      try {
        // Evaluate using Function (safer than raw eval) — still validate above
        const result = Function('"use strict"; return (' + expr + ')')();
        // Handle NaN/Infinity
        if (result === Infinity || result === -Infinity || Number.isNaN(result)) {
          display.value = 'Error';
        } else {
          display.value = String(result);
        }
      } catch (e) {
        display.value = 'Error';
      }
    }

    // Handle button clicks centrally
    keys.addEventListener('click', (e) => {
      const button = e.target.closest('button');
      if (!button) return;
      const val = button.dataset.value;
      const action = button.dataset.action;

      if (action === 'clear') clearDisplay();
      else if (action === 'delete') deleteLast();
      else if (action === 'toggle-sign') toggleSign();
      else if (action === 'calculate') calculate();
      else if (typeof val !== 'undefined') append(val);
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if ((/^[0-9]$/).test(key)) append(key);
      else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); }
      else if (key === 'Backspace') deleteLast();
      else if (key === 'Escape') clearDisplay();
      else if (['+','-','/','*','.','%','(',')'].includes(key)) append(key);
    });

    // Prevent typing into the readonly input via paste (optional)
    display.addEventListener('paste', (ev) => {
      ev.preventDefault();
    });
  </script>
</body>
</html>
